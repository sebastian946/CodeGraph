services:
  redis:
    image: redis:latest
    container_name: CodeGraph_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: CodeGraph_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app 
      - /app/.venv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data: 